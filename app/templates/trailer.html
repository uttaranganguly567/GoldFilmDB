{% extends "base.html" %}

{% block extra_css %}
<style>
    .react-player-container {
        height: calc(100vh - 75px); /* Subtract sticky navbar height */
        width: 100%;
        background-color: var(--dark-bg);
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        padding: 40px;
    }
    
    .video-wrapper {
        width: 100%;
        max-width: 1100px;
        height: 100%;
        max-height: 620px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 40px rgba(255, 215, 0, 0.05);
        border: 1px solid var(--glass-border);
        background: #000;
        animation: scaleReveal 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.1);
    }

    @keyframes scaleReveal {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }
    
    .trailer-iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    .btn-back-floating {
        position: absolute;
        top: 25px;
        left: 45px;
        background: rgba(15, 18, 24, 0.6);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: white;
        padding: 10px 20px;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 500;
        font-size: 0.95rem;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        z-index: 100;
        transition: all 0.3s ease;
    }

    .btn-back-floating:hover {
        background: var(--primary-gold);
        color: black;
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        transform: translateY(-2px);
    }
</style>
{% endblock %}

{% block content %}
<div class="react-player-container">
    <!-- Floating Back Trigger -->
    <a href="javascript:history.back()" class="btn-back-floating">
        <i class="fa-solid fa-arrow-left"></i> Back
    </a>

    <div class="video-wrapper">
        {% if ytTrailerId %}
        <iframe class="trailer-iframe" 
                src="https://www.youtube.com/embed/{{ ytTrailerId }}?autoplay=1&modestbranding=1&rel=0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
        </iframe>
        {% else %}
        <div class="text-center py-5">
            <h4 class="text-muted">No trailer ID provided.</h4>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
