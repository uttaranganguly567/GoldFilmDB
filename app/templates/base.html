<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoldFilmDB | Cinematic Catalog</title>
    <!-- Google Fonts: Outfit (Premium Geometric) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- FontAwesome Free Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    
    <style>
        :root {
            --primary-gold: #ffd700;
            --secondary-gold: #cca300;
            --dark-bg: #07080a;
            --panel-bg: rgba(15, 18, 24, 0.7);
            --glass-border: rgba(255, 255, 255, 0.07);
            --glass-glow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --text-muted: #8a8f9d;
        }

        * {
            box-sizing: border-box;
            font-family: 'Outfit', Arial, Helvetica, sans-serif;
        }

        body {
            padding: 0;
            margin: 0;
            background-color: var(--dark-bg);
            color: #f1f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Glassmorphic Navbar Customization */
        .navbar-custom {
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            background-color: rgba(7, 8, 10, 0.8) !important;
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
            z-index: 1000;
            box-shadow: var(--glass-glow);
        }

        .navbar-brand-custom {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--primary-gold) !important;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .navbar-brand-custom:hover {
            transform: scale(1.02);
        }

        .nav-link-custom {
            color: #f1f2f5 !important;
            font-weight: 500;
            font-size: 1rem;
            letter-spacing: 0.5px;
            padding: 8px 16px !important;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-link-custom::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 2px;
            left: 16px;
            background-color: var(--primary-gold);
            transition: width 0.3s ease;
            box-shadow: 0 0 8px var(--primary-gold);
        }

        .nav-link-custom:hover::after,
        .nav-link-custom.active::after {
            width: calc(100% - 32px);
        }

        .nav-link-custom:hover {
            color: var(--primary-gold) !important;
        }

        /* Premium Buttons */
        .btn-premium-outline {
            color: var(--primary-gold) !important;
            border: 1.5px solid var(--primary-gold) !important;
            background: transparent;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-radius: 30px;
            padding: 8px 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.2);
        }

        .btn-premium-outline:hover {
            background: var(--primary-gold) !important;
            color: #000 !important;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            transform: translateY(-2px);
        }

        .btn-premium-fill {
            background: var(--primary-gold) !important;
            border: 1.5px solid var(--primary-gold) !important;
            color: #000 !important;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-radius: 30px;
            padding: 8px 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .btn-premium-fill:hover {
            background: transparent !important;
            color: var(--primary-gold) !important;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            transform: translateY(-2px);
        }

        main {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* Custom Scrollbar for premium feel */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--dark-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: #252830;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-gold);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Premium Header/Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom" href="/">
                <i class="fa-solid fa-video-slash"></i> GOLDFILM
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll" aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarScroll">
                <ul class="navbar-nav me-auto my-2 my-lg-0" style="max-height: 100px;">
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom active" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="#">Watch List</a>
                    </li>
                </ul>
                <div class="d-flex gap-2">
                    <button class="btn btn-premium-outline" type="button">Login</button>
                    <button class="btn btn-premium-fill" type="button">Register</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap 5 Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
